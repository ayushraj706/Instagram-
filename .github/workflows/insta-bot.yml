name: BaseKey Ghost Engine - API Gateway V29.1

on:
  schedule:
    - cron: '0 */6 * * *'      # Har 6 ghante mein
  workflow_dispatch:          # Manual run button

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    runs-on: macos-latest     # IP block se bachne ke liye best hai
    timeout-minutes: 30       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright playwright-stealth cloudinary firebase-admin google-genai requests
          # 🔥 Playwright browser install karna sabse zaroori step hai
          playwright install chromium

      - name: 👻 Run Ghost API Bot
        run: python bot.py
        env:
          INSTA_COOKIES: ${{ secrets.INSTA_COOKIES }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Status Check
        if: always()
        run: |
          echo "Ghost V29 API Mission Finished!"
          
