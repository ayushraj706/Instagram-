name: BaseKey Ghost Engine - Auto Gateway

on:
  schedule:
    - cron: '0 */6 * * *'      # Har 6 ghante mein automatic chalega
  workflow_dispatch:          # Manual Run button ke liye
  repository_dispatch:        
    types: [start_ghost_automation]

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 15       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 💾 SESSION CACHING ---
      - name: 💾 Cache Browser Session
        uses: actions/cache@v4
        with:
          path: ./user_data
          key: ${{ runner.os }}-insta-session-v13
          restore-keys: |
            ${{ runner.os }}-insta-session-

      - name: 🛠️ Install Xvfb, FFMPEG & Puppeteer Deps
        # Yahan 'xvfb' install ho raha h jo virtual screen banayega
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb ffmpeg \
            libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 \
            libasound2t64 libpangocairo-1.0-0 libxss1 libxshmfence1 \
            libu2f-udev libvulkan1

      - name: 📦 Install Project Packages
        run: |
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth \
          cloudinary firebase-admin puppeteer-screen-recorder

      - name: 👻 Run Ghost Stealth Bot (With Xvfb Display)
        # 'xvfb-run' command browser ko ek virtual monitor (1280x1024) deta h
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node bot.js
        env:
          INSTA_COOKIES: ${{ secrets.INSTA_COOKIES }}
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

      - name: ✅ Status Check
        if: success()
        run: echo "Ghost V13 Stealth Sync Completed!"
        
