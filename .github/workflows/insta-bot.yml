name: BaseKey Ghost Engine - Auto Gateway

on:
  schedule:
    - cron: '0 */6 * * *'      # RATE LIMIT FIX: Ab ye har 6 ghante mein chalega (429 se bachne ke liye)
  workflow_dispatch:          # Manual button
  repository_dispatch:        
    types: [start_ghost_automation]

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 15       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 💾 ASLI MAGIC: SESSION CACHING ---
      # Ye step 'user_data' folder ko save karega taaki baar-baar login na karna pade
      - name: 💾 Cache Browser Session
        uses: actions/cache@v4
        with:
          path: ./user_data
          key: ${{ runner.os }}-insta-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-insta-session-

      - name: 🛠️ Install Puppeteer System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 \
            libasound2t64 libpangocairo-1.0-0 libxss1 libxshmfence1 \
            libu2f-udev libvulkan1

      - name: 📦 Install Project Packages
        run: npm install puppeteer cloudinary firebase-admin

      - name: 👻 Run Ghost Sniper Bot
        run: node bot.js
        env:
          INSTA_COOKIES: ${{ secrets.INSTA_COOKIES }}
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

      - name: ✅ Status Check
        if: success()
        run: echo "Ghost Sync Completed Successfully!"
        
