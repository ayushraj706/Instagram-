name: BaseKey Ghost Engine - API Gateway V29.2

on:
  schedule:
    - cron: '0 */6 * * *'      # Har 6 ghante mein check karega
  workflow_dispatch:          # Manual run button ke liye

concurrency:
  group: ghost-sync-group
  cancel-in-progress: false

jobs:
  automate:
    # 🍎 Mac OS use karne se IP block ka khatra sabse kam rehta hai
    runs-on: macos-latest
    
    timeout-minutes: 30       

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies & Playwright Force-Fix
        run: |
          pip install --upgrade pip
          # Sabhi libraries ko ek saath install kar rahe hain
          pip install playwright playwright-stealth cloudinary firebase-admin google-genai requests
          
          # 🔥 Playwright ke binaries aur system dependencies install karna
          playwright install chromium
          playwright install-deps chromium

      - name: 👻 Run Ghost API Bot (V29.2)
        run: python bot.py
        env:
          # Aapke saare secrets yahan securely linked hain
          INSTA_COOKIES: ${{ secrets.INSTA_COOKIES }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: ✅ Status Check
        if: always()
        run: |
          echo "Ghost V29.2 Mission Finished! Check logs for IP/Cookie status."
          
